services:
  - type: web
    name: gia-family-control-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/family-control-1.0.0.jar
    plan: free
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: gia_family_control
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
