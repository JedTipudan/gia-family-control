spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gia  # overridden by DataSourceConfig
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: 10000
  ssl:
    enabled: false  # Enable with cert in production

app:
  jwt:
    secret: ${JWT_SECRET:gia-family-control-super-secret-key-change-in-production-256bit}
    expiration-ms: 2592000000  # 30 days for persistent child login
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS:classpath:firebase-service-account.json}

logging:
  level:
    com.gia.familycontrol: DEBUG
