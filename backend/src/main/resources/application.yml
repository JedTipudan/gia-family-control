spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gia_family_control}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yourpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  ssl:
    enabled: false  # Enable with cert in production

app:
  jwt:
    secret: ${JWT_SECRET:gia-family-control-super-secret-key-change-in-production-256bit}
    expiration-ms: 86400000  # 24 hours
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS:classpath:firebase-service-account.json}

logging:
  level:
    com.gia.familycontrol: INFO
