name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Release APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias gia \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass gia12345 \
            -keypass gia12345 \
            -dname "CN=Gia Family Control, OU=Mobile, O=Gia, L=Manila, S=NCR, C=PH"

          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:gia12345 \
            --key-pass pass:gia12345 \
            --ks-key-alias gia \
            --out android-app/app/build/outputs/apk/release/GiaFamilyControl.apk \
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Gia Family Control v${{ github.run_number }}"
          body: |
            ## Gia Family Control - Latest Release

            ### How to Install:
            1. Download **GiaFamilyControl.apk** below
            2. On your Android phone:
               - Go to **Settings → Security**
               - Enable **Install unknown apps**
            3. Open the APK and tap **Install**
            4. Grant all permissions when asked

            ### Features:
            - Real-time GPS location tracking
            - Remote device lock/unlock
            - App blocking & monitoring
            - SOS emergency alert
            - Geofencing alerts
            - Battery monitoring
          files: android-app/app/build/outputs/apk/release/GiaFamilyControl.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
