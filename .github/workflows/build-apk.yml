name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android-app/app/build/outputs/apk/debug/app-debug.apk \
             android-app/app/build/outputs/apk/debug/GiaFamilyControl.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Gia Family Control v${{ github.run_number }}"
          body: |
            ## Gia Family Control - Latest Build

            ### How to Install on Android:
            1. Download **GiaFamilyControl.apk** below
            2. On your Android phone:
               - Go to **Settings → Security** (or Privacy)
               - Enable **Install unknown apps**
               - Or allow your browser to install unknown apps
            3. Open the downloaded APK file
            4. Tap **Install**
            5. Grant all permissions when asked (Location, Usage Stats, etc.)

            ### First Time Setup:
            - **Parent**: Login → your pair code will be shown
            - **Child**: Login → enter parent's pair code to link devices

            ### Features:
            - Real-time GPS location tracking
            - Remote device lock/unlock
            - App blocking & monitoring
            - SOS emergency alert
            - Battery & online status monitoring
          files: android-app/app/build/outputs/apk/debug/GiaFamilyControl.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
