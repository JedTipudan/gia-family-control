name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew
        
      - name: Build Debug APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Gia Family Control v${{ github.run_number }}"
          body: |
            ## Gia Family Control - Latest Build
            
            ### Install Instructions:
            1. Download `app-debug.apk` below
            2. On your Android phone go to Settings → Security → Enable **Unknown Sources**
            3. Open the downloaded APK and install
            
            ### What's included:
            - Location tracking
            - Remote lock/unlock
            - App blocking
            - SOS button
            - Parent dashboard
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
