name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Release APK
        run: |
          cd android-app
          ./gradlew assembleRelease

      - name: Sign APK with debug keystore
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out android-app/app/build/outputs/apk/release/app-release-signed.apk \
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Gia Family Control v${{ github.run_number }}"
          body: |
            ## Gia Family Control - Latest Release

            ### How to Install on Android:
            1. Download `app-release-signed.apk` below
            2. On your phone go to **Settings → Security → Install unknown apps**
            3. Allow your browser or file manager to install
            4. Open the APK file and tap **Install**

            ### Features:
            - Real-time location tracking
            - Remote device lock/unlock
            - App blocking & monitoring
            - SOS emergency alert
            - Geofencing alerts
          files: android-app/app/build/outputs/apk/release/app-release-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
