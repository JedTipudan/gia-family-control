name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android-app/app/google-services.json
          echo "File size: $(wc -c < android-app/app/google-services.json)"
          head -c 50 android-app/app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android-app/app/gia-release.keystore
          echo "Keystore size: $(wc -c < android-app/app/gia-release.keystore) bytes"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Release APK
        working-directory: android-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android-app/app/gia-release.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out android-app/app/build/outputs/apk/release/GiaFamilyControl.apk \
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify \
            android-app/app/build/outputs/apk/release/GiaFamilyControl.apk
          echo "APK signature verified successfully!"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Gia Family Control v${{ github.run_number }}"
          body: |
            ## Gia Family Control - Official Release v${{ github.run_number }}

            ### How to Install on Android:
            1. Download **GiaFamilyControl.apk** below
            2. On your Android phone:
               - Go to **Settings → Security** (or Privacy)
               - Enable **Install unknown apps**
               - Allow your browser or Files app to install
            3. Open the downloaded APK
            4. Tap **Install**
            5. Grant all permissions when asked

            ### First Time Setup:
            - **Parent device**: Register → Login → share your pair code
            - **Child device**: Register → Login → enter parent pair code

            ### Permissions Required:
            - Location (for GPS tracking)
            - Usage Stats (for app monitoring)
            - Draw over other apps (for lock screen)
            - Device Admin (for tamper prevention)
          files: android-app/app/build/outputs/apk/release/GiaFamilyControl.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
