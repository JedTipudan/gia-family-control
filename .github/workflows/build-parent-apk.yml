name: Build & Release Parent APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Add google-services.json
        env:
          PARENT_GOOGLE_SERVICES_JSON: ${{ secrets.PARENT_GOOGLE_SERVICES_JSON }}
        run: |
          echo "$PARENT_GOOGLE_SERVICES_JSON" | base64 -di > android-app/app/google-services.json
          echo "File size: $(wc -c < android-app/app/google-services.json)"

      - name: Decode Keystore
        env:
          PARENT_KEYSTORE_BASE64: ${{ secrets.PARENT_KEYSTORE_BASE64 }}
        run: |
          echo "$PARENT_KEYSTORE_BASE64" | base64 -di > android-app/parent-app-release.jks
          echo "Keystore size: $(wc -c < android-app/parent-app-release.jks) bytes"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Build Release APK
        working-directory: android-app
        env:
          STORE_PASSWORD: ${{ secrets.PARENT_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.PARENT_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        run: |
          APK_PATH=$(find android-app/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android-app/parent-app-release.jks \
            --ks-pass pass:${{ secrets.PARENT_STORE_PASSWORD }} \
            --ks-key-alias parent-app \
            --key-pass pass:${{ secrets.PARENT_KEY_PASSWORD }} \
            --out android-app/app/build/outputs/apk/release/GiaParentControl.apk \
            "$APK_PATH"

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify \
            android-app/app/build/outputs/apk/release/GiaParentControl.apk && \
          echo "APK signature verified successfully!"

      - name: Delete old latest-parent tag
        run: |
          git tag -d latest-parent 2>/dev/null || true
          git push origin :refs/tags/latest-parent 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-parent
          name: "Gia Parent Control — Latest"
          body: |
            ## Gia Parent Control — Latest Build

            ### How to Install on Android:
            1. Download **GiaParentControl.apk** below
            2. On your Android phone:
               - Go to **Settings → Security** (or Privacy)
               - Enable **Install unknown apps**
               - Allow your browser or Files app to install
            3. Open the downloaded APK
            4. Tap **Install**
            5. Grant all permissions when asked

            ### First Time Setup:
            - Register → Login → share your pair code with the child device
          files: android-app/app/build/outputs/apk/release/GiaParentControl.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
